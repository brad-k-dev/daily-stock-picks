name: 📈 Daily Stock Picks Update

on:
  schedule:
    # 매일 오전 9시 KST (= 00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:   # 수동 실행 버튼도 활성화

permissions:
  contents: write

jobs:
  update-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: pip install anthropic requests beautifulsoup4 lxml

      - name: 📡 주식 데이터 수집 및 HTML 갱신
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 update_picks.py

      - name: 💾 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "📈 Daily update: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          git push
